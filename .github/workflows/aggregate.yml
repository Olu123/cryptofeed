name: RSS Aggregator

on:
  schedule:
    # Every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger aggregation
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.AGGREGATE_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.APP_URL }}/api/aggregate"
